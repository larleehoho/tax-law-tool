<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a56db">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <title>税法速查 · 会计专属</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Header -->
  <div class="header">
    <h1>📜 税法速查</h1>
    <div class="header-actions">
      <button class="header-btn" id="searchToggleBtn">🔍</button>
      <button class="header-btn" id="favGoBtn">⭐</button>
    </div>
  </div>

  <!-- Search Bar -->
  <div class="search-bar hidden" id="searchBar">
    <input type="text" id="searchInput" placeholder="搜索法规名称...">
    <button class="clear-btn" id="searchClearBtn">✕</button>
  </div>

  <!-- App Body -->
  <div class="app-body" id="appBody">

    <!-- Page: Home -->
    <div class="section" id="pageHome">
      <div class="quick-filters" id="quickFilters">
        <button class="qf-btn active" data-filter="">📋 全部</button>
        <button class="qf-btn" data-filter="fav">⭐ 收藏</button>
        <button class="qf-btn" data-filter="recent">🕐 最近</button>
      </div>
      <div id="categoryList"></div>
      <div class="pagination" id="pagination"></div>
    </div>

    <!-- Page: Detail -->
    <div class="section hidden" id="pageDetail">
      <div class="back-bar">
        <button class="back-btn" id="detailBackBtn">‹</button>
        <span style="font-size:15px;font-weight:500;">法规详情</span>
      </div>
      <div id="detailContent"></div>
    </div>

    <!-- Page: Search -->
    <div class="section hidden" id="pageSearch">
      <div class="search-page">
        <input type="text" id="globalSearchInput" placeholder="请输入关键词搜索...">
        <div id="searchResults"></div>
        <div class="pagination" id="searchPagination"></div>
      </div>
    </div>

    <!-- Page: Favorites -->
    <div class="section hidden" id="pageFav">
      <div id="favContent"></div>
      <div class="pagination" id="favPagination"></div>
    </div>

    <!-- Page: Settings -->
    <div class="section hidden" id="pageSettings">
      <div class="settings-page" style="padding-top:0;">
        <div class="stats-card" id="statsCard">加载中...</div>
        <div class="setting-item"><label>深色模式</label><div class="switch" id="darkSwitch"></div></div>
        <div class="setting-item"><label>收藏数</label><span id="favCount">0</span></div>
        <div class="setting-item" style="flex-direction:column;align-items:flex-start;gap:8px;border:none;">
          <label>更新检测</label>
          <span style="font-size:13px;color:var(--text-muted);" id="updateInfo">上次检测：--</span>
          <button style="padding:6px 16px;border:1px solid var(--border);border-radius:6px;background:var(--card-bg);cursor:pointer;font-size:13px;" id="checkUpdateBtn">🔄 手动检测</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <button class="nav-item active" data-page="home"><span class="icon">📂</span>分类</button>
    <button class="nav-item" data-page="fav"><span class="icon">⭐</span>收藏</button>
    <button class="nav-item" data-page="search"><span class="icon">🔍</span>搜索</button>
    <button class="nav-item" data-page="settings"><span class="icon">⚙️</span>设置</button>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
